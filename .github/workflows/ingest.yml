name: Ingest Redfin Data

on:
  schedule:
    # Every Monday at 10:00 UTC — Redfin releases on Fridays, Monday gives buffer
    - cron: '0 10 * * 1'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ingest
        run: npm run ingest >> $GITHUB_STEP_SUMMARY
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "## Ingest Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "Common causes: Redfin file format changed, Supabase connection failed, secrets missing." >> $GITHUB_STEP_SUMMARY
